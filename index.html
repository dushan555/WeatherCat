<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherCat 🐱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            font-size: 24px;
        }
        h1 span {
            font-size: 32px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,0.9);
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: #4facfe;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #00f2fe;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .weather-card {
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 20px;
            color: #fff;
            display: none;
        }
        .weather-card.show {
            display: block;
        }
        .location {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        .main-temp {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            margin: 15px 0;
        }
        .weather-desc {
            text-align: center;
            font-size: 20px;
            margin-bottom: 15px;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .detail-item {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .detail-item .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .detail-item .value {
            font-size: 16px;
            font-weight: bold;
        }
        .aqi-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .aqi-good { background: rgba(34,139,34,0.3); }
        .aqi-moderate { background: rgba(255,165,0,0.3); }
        .aqi-unhealthy { background: rgba(255,0,0,0.3); }
        .aqi-hazardous { background: rgba(128,0,128,0.3); }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 15px 0;
        }
        .loading {
            text-align: center;
            color: #aaa;
            padding: 30px;
            display: none;
        }
        .loading.show {
            display: block;
        }
        .error {
            text-align: center;
            color: #ff6b6b;
            padding: 20px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>🐱</span> WeatherCat</h1>
        
        <div class="search-box">
            <input type="text" id="locationInput" placeholder="输入城市，如：上海" onkeypress="if(event.key==='Enter')searchWeather()">
            <button id="searchBtn" onclick="searchWeather()">查询</button>
        </div>
        
        <div class="loading" id="loading">加载中...</div>
        <div class="error" id="error"></div>
        
        <div class="weather-card" id="weatherCard">
            <div class="location" id="locationName">上海</div>
            
            <div class="weather-desc" id="weatherDesc">☀️ 晴朗</div>
            <div class="main-temp" id="mainTemp">25°C</div>
            
            <div class="details">
                <div class="detail-item">
                    <div class="label">体感温度</div>
                    <div class="value" id="feelsLike">27°C</div>
                </div>
                <div class="detail-item">
                    <div class="label">湿度</div>
                    <div class="value" id="humidity">65%</div>
                </div>
                <div class="detail-item">
                    <div class="label">风速</div>
                    <div class="value" id="windSpeed">12 km/h</div>
                </div>
                <div class="detail-item">
                    <div class="label">风力</div>
                    <div class="value" id="windLevel">3级 微风</div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="aqi-box" id="aqiBox">
                <div id="aqiText">🟢 优</div>
                <div id="aqiDesc" style="font-size:12px;margin-top:5px;">空气质量令人满意</div>
            </div>
            <div id="visibilityBox" class="detail-item" style="margin-top:15px;display:none;">
                <div class="label">能见度</div>
                <div class="value" id="visibilityValue">-</div>
            </div>
        </div>
        
        <div class="footer">数据来源：Open-Meteo</div>
    </div>

    <script>
        // 天气代码转文字和emoji
        const weatherCodes = {
            0: "☀️ 晴朗", 1: "🌤️ 大部晴朗", 2: "⛅ 多云", 3: "☁️ 阴天",
            45: "🌫️ 雾", 48: "🌫️ 雾凇",
            51: "🌧️ 小雨", 53: "🌧️ 中雨", 55: "🌧️ 大雨",
            61: "🌧️ 小雨", 63: "🌧️ 中雨", 65: "🌧️ 大雨",
            71: "❄️ 小雪", 73: "❄️ 中雪", 75: "❄️ 大雪",
            80: "🌧️ 阵雨", 81: "🌧️ 中阵雨", 82: "🌧️ 大阵雨",
            95: "⛈️ 雷暴", 96: "⛈️ 雷暴+冰雹", 99: "⛈️ 雷暴+大雪"
        };

        // AQI等级
        function aqiInfo(aqi) {
            if (aqi <= 50) return { text: "🟢 优", desc: "空气质量令人满意", class: "aqi-good" };
            if (aqi <= 100) return { text: "🟡 良", desc: "空气质量可接受", class: "aqi-moderate" };
            if (aqi <= 150) return { text: "🟠 轻度污染", desc: "敏感人群需注意", class: "aqi-moderate" };
            if (aqi <= 200) return { text: "🔴 中度污染", desc: "可能影响健康", class: "aqi-unhealthy" };
            if (aqi <= 300) return { text: "🟣 重度污染", desc: "尽量减少户外活动", class: "aqi-unhealthy" };
            return { text: "⚫ 严重污染", desc: "避免户外活动", class: "aqi-hazardous" };
        }

        // 风力等级
        function windLevel(speed) {
            if (speed < 1) return "0级 无风 🌀";
            if (speed < 6) return "1级 软风 🍃";
            if (speed < 12) return "2级 轻风 🌿";
            if (speed < 20) return "3级 微风 🍂";
            if (speed < 29) return "4级 和风 🌾";
            if (speed < 39) return "5级 清劲风 🌲";
            if (speed < 50) return "6级 强风 🚩";
            if (speed < 62) return "7级 疾风 🌳";
            if (speed < 75) return "8级 大风 🏚️";
            if (speed < 89) return "9级 烈风 🧱";
            if (speed < 103) return "10级 狂风 🌴";
            if (speed < 118) return "11级 暴风 💥";
            return "12级 飓风 🌪️";
        }

        // 地理编码
        async function geocode(location) {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1`;
            const res = await fetch(url, { headers: { "User-Agent": "WeatherCatPage/1.0" } });
            const data = await res.json();
            if (!data.length) throw new Error("未找到该地址");
            return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        }

        // 获取天气
        async function getWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m&timezone=Asia/Shanghai`;
            const res = await fetch(url);
            return res.json();
        }

        // 获取空气质量
        async function getAirQuality(lat, lon) {
            const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,pm2_5,pm10,visibility&timezone=Asia/Shanghai`;
            const res = await fetch(url);
            return res.json();
        }

        // 风向角度转文字
        function windDir(deg) {
            const dirs = ["北", "东北", "东", "东南", "南", "西南", "西", "西北"];
            return dirs[Math.round(deg / 45) % 8];
        }

        // 主函数
        async function searchWeather() {
            const input = document.getElementById("locationInput");
            const location = input.value.trim();
            if (!location) return;

            const searchBtn = document.getElementById("searchBtn");
            const loading = document.getElementById("loading");
            const error = document.getElementById("error");
            const card = document.getElementById("weatherCard");

            searchBtn.disabled = true;
            loading.classList.add("show");
            error.classList.remove("show");
            card.classList.remove("show");

            try {
                // 1. 地理编码
                const { lat, lon } = await geocode(location);

                // 2. 并行请求天气和空气质量
                const [weather, air] = await Promise.all([
                    getWeather(lat, lon),
                    getAirQuality(lat, lon)
                ]);

                // 3. 更新UI
                const current = weather.current;
                const aqiData = air.current;

                document.getElementById("locationName").textContent = location;
                document.getElementById("weatherDesc").textContent = weatherCodes[current.weather_code] || "❓ 未知";
                document.getElementById("mainTemp").textContent = `${Math.round(current.temperature_2m)}°C`;
                document.getElementById("feelsLike").textContent = `${Math.round(current.apparent_temperature)}°C`;
                document.getElementById("humidity").textContent = `${current.relative_humidity_2m}%`;
                document.getElementById("windSpeed").textContent = `${current.wind_speed_10m} km/h`;
                document.getElementById("windLevel").textContent = windLevel(current.wind_speed_10m);

                // 风向
                const dir = windDir(current.wind_direction_10m);
                document.getElementById("windSpeed").textContent += ` (${dir}风)`;

                // AQI
                const aqi = aqiData.us_aqi;
                const info = aqiInfo(aqi);
                const aqiBox = document.getElementById("aqiBox");
                aqiBox.className = "aqi-box " + info.class;
                document.getElementById("aqiText").textContent = aqi+" "+info.text;
                document.getElementById("aqiDesc").textContent = info.desc;

                // 能见度
                const visibilityBox = document.getElementById("visibilityBox");
                const visibility = aqiData.visibility;
                if (visibility != null) {
                    const km = (visibility / 1000).toFixed(1);
                    document.getElementById("visibilityValue").textContent = km + " km";
                    visibilityBox.style.display = "block";
                }

                card.classList.add("show");
            } catch (e) {
                error.textContent = e.message || "查询失败";
                error.classList.add("show");
            } finally {
                searchBtn.disabled = false;
                loading.classList.remove("show");
            }
        }

        // 默认显示上海天气
        document.getElementById("locationInput").value = "上海";
        searchWeather();
    </script>
</body>
</html>
